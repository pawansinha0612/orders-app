name: CI/CD

on:
  push:
    branches: [ main ]

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: orders
        ports: [ "5432:5432" ]
        options: >-
          --health-cmd "pg_isready -U app"
          --health-interval 5s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm install
      - name: Start app
        env:
          DATABASE_URL: postgresql://app:app@localhost:5432/orders
          DB_SSL: "false"
        run: |
          node server.js &
          for i in $(seq 1 20); do curl -sf http://localhost:8080/healthz && break; sleep 1; done
      - uses: grafana/setup-k6-action@v1
      - name: k6 smoke test (the gate)
        run: k6 run k6/smoke.js

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::801702848188:role/github-actions-deploy
          aws-region: ap-southeast-2
      - name: Deploy via SSM
        run: |
          cat > params.json << 'JSON'
          {
            "commands": [
              "runuser -l ec2-user -c 'cd ~/orders-app && git pull && npm install --omit=dev'",
              "systemctl restart orders-app"
            ]
          }
          JSON
          CMD=$(aws ssm send-command \
            --instance-ids i-010edc7a87864b096 \
            --document-name "AWS-RunShellScript" \
            --comment "deploy ${{ github.sha }}" \
            --parameters file://params.json \
            --query Command.CommandId --output text)
          echo "Command ID: $CMD"
          aws ssm wait command-executed --command-id "$CMD" --instance-id i-010edc7a87864b096 || true
          STATUS=$(aws ssm get-command-invocation --command-id "$CMD" --instance-id i-010edc7a87864b096 --query 'Status' --output text)
          echo "SSM status: $STATUS"
          aws ssm get-command-invocation --command-id "$CMD" --instance-id i-010edc7a87864b096 --query 'StandardOutputContent' --output text
          aws ssm get-command-invocation --command-id "$CMD" --instance-id i-010edc7a87864b096 --query 'StandardErrorContent' --output text
          test "$STATUS" = "Success"